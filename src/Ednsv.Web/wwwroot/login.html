<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ednsv - Sign in</title>
<style>
  :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --error: #f87171; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.75rem 1.5rem; }
  h1 { font-size: 1.25rem; color: var(--accent); margin-bottom: 0.25rem; }
  .subtitle { color: var(--muted); font-size: 0.82rem; margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; margin-top: 0.75rem; }
  input { width: 100%; padding: 0.55rem 0.7rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: inherit; font-size: 0.9rem; outline: none; }
  input:focus { border-color: var(--accent); }
  button { width: 100%; padding: 0.6rem; margin-top: 1.25rem; background: var(--accent); color: var(--bg); border: none; border-radius: 4px; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: var(--error); font-size: 0.82rem; margin-top: 0.75rem; min-height: 1rem; }
  .hint { color: var(--muted); font-size: 0.72rem; margin-top: 1rem; line-height: 1.4; }
  .divider { display: flex; align-items: center; gap: 0.6rem; color: var(--muted); font-size: 0.72rem; margin-top: 1rem; }
  .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid var(--border); }
  .sso { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-top: 1rem; }
  .sso:hover { background: rgba(56, 189, 248, 0.1); opacity: 1; }
</style>
</head>
<body>
<div class="card">
  <h1>ednsv</h1>
  <p class="subtitle">Sign in to continue</p>
  <form id="form" autocomplete="on">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" autofocus required>
    <label for="token">Token</label>
    <input type="password" id="token" name="token" autocomplete="current-password" required>
    <button type="submit" id="btn">Sign in</button>
  </form>
  <div class="divider" id="ssoDivider" style="display:none">or</div>
  <button type="button" class="sso" id="ssoBtn" style="display:none">Sign in with single sign-on</button>
  <div class="error" id="err"></div>
  <p class="hint" id="hint">Root user is <code>ednsv</code>. Use the token whose hash is in EDNSV_AUTH_TOKEN_HASH, or one issued from the tokens page.</p>
</div>

<script>
const form = document.getElementById('form');
const btn = document.getElementById('btn');
const err = document.getElementById('err');

const params = new URLSearchParams(location.search);
const nextParam = params.get('next') || '/';
const next = nextParam.startsWith('/') && !nextParam.startsWith('//') ? nextParam : '/';
if (params.get('error') === 'sso_failed')
  err.textContent = 'Single sign-on failed. Try again, or contact your administrator if you were denied access.';

// Show only the sign-in methods this instance has enabled.
fetch('/api/auth/methods').then(r => r.ok ? r.json() : null).then(m => {
  if (!m) return;
  if (!m.tokenAuth) {
    form.style.display = 'none';
    document.getElementById('hint').style.display = 'none';
  }
  if (m.sso) {
    document.getElementById('ssoBtn').style.display = '';
    if (m.tokenAuth) document.getElementById('ssoDivider').style.display = '';
  }
}).catch(() => {});

document.getElementById('ssoBtn').addEventListener('click', () => {
  location.href = '/api/auth/oidc/login?next=' + encodeURIComponent(next);
});

form.addEventListener('submit', async e => {
  e.preventDefault();
  err.textContent = '';
  btn.disabled = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        username: document.getElementById('username').value,
        token: document.getElementById('token').value
      })
    });
    if (res.ok) {
      location.href = next;
      return;
    }
    const data = await res.json().catch(() => ({}));
    err.textContent = data.error || `Sign-in failed (${res.status})`;
  } catch (ex) {
    err.textContent = ex.message;
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
