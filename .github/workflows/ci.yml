name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build & Test
  # ──────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Run against test domains
        run: |
          mkdir -p test-output

          DOMAINS="google.com gmail.com cnn.com example.com"
          OVERALL_EXIT=0

          for domain in $DOMAINS; do
            echo "============================================"
            echo "Testing: $domain"
            echo "============================================"

            # Run with JSON output, capture result
            if dotnet run --project src/Ednsv.Cli --configuration Release -- "$domain" --format json > "test-output/${domain}.json" 2>&1; then
              echo "PASS: $domain completed successfully"
            else
              echo "FAIL: $domain exited with error"
              OVERALL_EXIT=1
            fi

            # Show summary
            python3 -c "
          import json, sys
          try:
              d = json.load(open('test-output/${domain}.json'))
              total = len(d['results'])
              print(f'  Checks: {total}, Pass: {d[\"passCount\"]}, Warn: {d[\"warningCount\"]}, Error: {d[\"errorCount\"]}, Critical: {d[\"criticalCount\"]}')
              print(f'  Duration: {d[\"duration\"]}')
              for r in d['results']:
                  sev = {0:'INFO', 1:'PASS', 2:'WARN', 3:'FAIL', 4:'CRIT'}.get(r['severity'], '????')
                  print(f'    [{sev}] {r[\"checkName\"]}: {r[\"summary\"]}')
                  for w in r.get('warnings', []):
                      print(f'          ⚠ {w}')
                  for e in r.get('errors', []):
                      print(f'          ✗ {e}')
          except Exception as e:
              print(f'  Could not parse output: {e}')
              with open('test-output/${domain}.json') as f:
                  print(f.read()[:2000])
          " || true

            echo ""
          done

          exit $OVERALL_EXIT

      - name: Run verbose check against test domains
        if: always()
        run: |
          mkdir -p test-output
          DOMAINS="google.com gmail.com cnn.com example.com"

          for domain in $DOMAINS; do
            echo "============================================"
            echo "Verbose: $domain"
            echo "============================================"

            dotnet run --project src/Ednsv.Cli --configuration Release -- "$domain" --verbose \
              > "test-output/${domain}-verbose.txt" 2>&1 || true

            cat "test-output/${domain}-verbose.txt"
            echo ""
          done

      - name: Disk cache integration test (cold + warm run)
        if: always()
        run: |
          mkdir -p test-output
          CACHE_DIR="test-output/integration-cache"
          DOMAIN="gmail.com"

          echo "============================================"
          echo "Cold run: $DOMAIN (no cache, verbose, trace)"
          echo "============================================"
          dotnet run --project src/Ednsv.Cli --configuration Release -- \
            "$DOMAIN" --verbose --trace --cache "$CACHE_DIR" \
            > "test-output/${DOMAIN}-cold.txt" 2>&1 || true
          cat "test-output/${DOMAIN}-cold.txt"

          echo ""
          echo "============================================"
          echo "Cache directory contents:"
          echo "============================================"
          python3 -c "
          import json, os, glob
          cache_dir = '$CACHE_DIR'
          for f in sorted(glob.glob(os.path.join(cache_dir, '*.json'))):
              try:
                  d = json.load(open(f))
                  print(f'  {os.path.basename(f)}: {len(d)} entries')
              except: pass
          " || echo "  Could not read cache directory"

          echo ""
          echo "============================================"
          echo "Warm run: $DOMAIN (from cache, verbose, trace)"
          echo "============================================"
          dotnet run --project src/Ednsv.Cli --configuration Release -- \
            "$DOMAIN" --verbose --trace --cache "$CACHE_DIR" \
            > "test-output/${DOMAIN}-warm.txt" 2>&1 || true
          cat "test-output/${DOMAIN}-warm.txt"

          echo ""
          echo "============================================"
          echo "Cache effectiveness comparison:"
          echo "============================================"
          python3 -c "
          import re, sys

          def parse_timing(path):
              # Strip ANSI escape codes for reliable parsing
              raw = open(path).read()
              text = re.sub(r'\x1b\[[0-9;]*m', '', raw)
              times = {}
              # Duration is in a Spectre.Console table: │ Duration │ 80.7s │
              dur = re.search(r'Duration\s*│\s*(\d+\.?\d*)s', text)
              if dur: times['TOTAL'] = float(dur.group(1))
              # Extract cache load line
              cache = re.search(r'Loaded cache[^\n]*', text)
              if cache: times['_cache_line'] = cache.group(0).strip()
              # Extract hit/miss from verbose lines
              hm = re.findall(r'dns:(\d+)h/(\d+)m', text)
              if hm:
                  times['_dns_hits'] = sum(int(h) for h,m in hm)
                  times['_dns_misses'] = sum(int(m) for h,m in hm)
              return times

          cold = parse_timing('test-output/${DOMAIN}-cold.txt')
          warm = parse_timing('test-output/${DOMAIN}-warm.txt')

          if '_cache_line' in warm:
              print(f'  Cache: {warm[\"_cache_line\"]}')
          if '_dns_hits' in warm:
              print(f'  Warm run DNS: {warm[\"_dns_hits\"]} hits, {warm[\"_dns_misses\"]} misses')
          if '_dns_hits' in cold:
              print(f'  Cold run DNS: {cold[\"_dns_hits\"]} hits, {cold[\"_dns_misses\"]} misses')

          cold_total = cold.get('TOTAL', 0)
          warm_total = warm.get('TOTAL', 0)
          if cold_total and warm_total:
              speedup = cold_total / warm_total if warm_total > 0 else 0
              print(f'  Cold: {cold_total:.1f}s  Warm: {warm_total:.1f}s  Speedup: {speedup:.1f}x')
          elif cold_total:
              print(f'  Cold: {cold_total:.1f}s  Warm: could not parse')
          else:
              print(f'  Could not extract total durations')
          " || true

      - name: Recheck integration test (--recheck warning)
        if: always()
        run: |
          mkdir -p test-output
          CACHE_DIR="test-output/integration-cache"
          DOMAIN="gmail.com"

          echo "============================================"
          echo "Domain results from previous run:"
          echo "============================================"
          python3 -c "
          import json, os
          path = os.path.join('$CACHE_DIR', 'domain-results.json')
          if os.path.exists(path):
              data = json.load(open(path))
              for domain, summary in data.items():
                  issues = summary.get('issueChecks', [])
                  print(f'  {domain}: {len(issues)} issues')
                  for issue in issues:
                      print(f'    - {issue[\"name\"]} ({issue[\"category\"]}): {issue[\"severity\"]}')
          else:
              print('  No domain-results.json found')
          " || echo "  Could not read domain results"

          echo ""
          echo "============================================"
          echo "Recheck run: $DOMAIN (--recheck warning, trace)"
          echo "============================================"
          dotnet run --project src/Ednsv.Cli --configuration Release -- \
            "$DOMAIN" --verbose --trace --cache "$CACHE_DIR" --recheck warning \
            > "test-output/${DOMAIN}-recheck.txt" 2>&1 || true
          cat "test-output/${DOMAIN}-recheck.txt"

          echo ""
          echo "============================================"
          echo "Recheck analysis:"
          echo "============================================"
          python3 -c "
          import re

          raw = open('test-output/${DOMAIN}-recheck.txt').read()
          text = re.sub(r'\x1b\[[0-9;]*m', '', raw)

          # Check if recheck cleared anything
          recheck_line = re.search(r'Recheck: cleared stale cache for.*\(([^)]+)\)', text)
          if recheck_line:
              print(f'  Cache deps cleared: {recheck_line.group(1)}')
          else:
              print('  No recheck clearing detected (domain may have had no issues)')

          # DNS hits/misses — recheck should have more misses than warm run
          hm = re.findall(r'dns:(\d+)h/(\d+)m', text)
          if hm:
              hits = sum(int(h) for h,m in hm)
              misses = sum(int(m) for h,m in hm)
              print(f'  Recheck DNS: {hits} hits, {misses} misses')

          # Duration
          dur = re.search(r'Duration\s*│\s*(\d+\.?\d*)s', text)
          if dur:
              print(f'  Duration: {dur.group(1)}s')

          # Cache load line
          cache = re.search(r'Loaded cache[^\n]*', text)
          if cache:
              print(f'  Cache: {cache.group(0).strip()}')
          " || true

      - name: Multi-domain run (in-memory cache reuse across domains)
        if: always()
        run: |
          mkdir -p test-output
          echo "============================================"
          echo "Multi-domain run: google.com gmail.com (verbose)"
          echo "============================================"
          echo "Domains sharing infrastructure should show cache hits on 2nd domain..."
          dotnet run --project src/Ednsv.Cli --configuration Release -- \
            google.com gmail.com --verbose \
            > "test-output/multi-domain.txt" 2>&1 || true
          cat "test-output/multi-domain.txt"

          echo ""
          echo "============================================"
          echo "Per-domain cache reuse analysis:"
          echo "============================================"
          python3 -c "
          import re

          # Strip ANSI escape codes
          raw = open('test-output/multi-domain.txt').read()
          text = re.sub(r'\x1b\[[0-9;]*m', '', raw)

          # Duration is in Spectre table: │ Duration │ 80.7s │
          durations = [float(m.group(1)) for m in re.finditer(r'Duration\s*│\s*(\d+\.?\d*)s', text)]

          # Find DNS hit/miss totals per domain block (split on Validating:)
          blocks = re.split(r'Validating:', text)
          domains = ['google.com', 'gmail.com']
          for i, block in enumerate(blocks[1:], 1):
              hm = re.findall(r'dns:(\d+)h/(\d+)m', block)
              hits = sum(int(h) for h,_ in hm)
              misses = sum(int(m) for _,m in hm)
              name = domains[i-1] if i <= len(domains) else f'domain #{i}'
              dur = f'{durations[i-1]:.1f}s' if i <= len(durations) else '?'
              print(f'  {name}: {dur}, dns:{hits}h/{misses}m')

          if len(durations) >= 2:
              print(f'  Speedup: {durations[0]/durations[1]:.1f}x' if durations[1] > 0 else '  2nd domain was instant')
          " || true

      - name: Upload test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: test-output/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Push Build Logs
  # ──────────────────────────────────────────────────────────────────────────
  push-build-logs:
    name: Push Build Logs
    needs: [build-and-test]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine build status
        id: status
        run: |
          BUILD_RESULT="${{ needs.build-and-test.result }}"
          if [ "$BUILD_RESULT" = "success" ]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: test-reports
        continue-on-error: true

      - name: Generate log summary
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.triggering_actor }}
          RESULT: ${{ steps.status.outputs.result }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          mkdir -p logs
          {
            echo "# Build Log"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Run** | #${RUN_NUMBER} (attempt ${RUN_ATTEMPT}) |"
            echo "| **Run ID** | ${RUN_ID} |"
            echo "| **Result** | ${RESULT} |"
            echo "| **Commit** | ${SHA} |"
            echo "| **Ref** | ${REF} |"
            echo "| **Event** | ${EVENT_NAME} |"
            echo "| **Actor** | ${ACTOR} |"
            if [ -n "$PR_NUMBER" ]; then
              echo "| **PR** | #${PR_NUMBER}: ${PR_TITLE} |"
              echo "| **Branch** | ${HEAD_REF} |"
            fi
            echo ""
            if [ -d "test-reports" ]; then
              echo "## Artifacts"
              echo '```'
              find test-reports -type f | sort
              echo '```'
            fi
          } > logs/build-summary.md

      - name: Fetch build and test logs via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch job details
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            > logs/jobs.json 2>/dev/null || true

          # Download logs for completed jobs only
          if [ -f logs/jobs.json ]; then
            jq -r '.jobs[] | select(.status == "completed") | "\(.id) \(.name)"' logs/jobs.json 2>/dev/null \
              | while read -r job_id job_name; do
                  safe_name=$(echo "$job_name" | tr ' /' '-_' | tr '[:upper:]' '[:lower:]')
                  gh api "repos/${{ github.repository }}/actions/jobs/${job_id}/logs" \
                    > "logs/${safe_name}.log" 2>/dev/null || true
                done
          fi

      - name: Push logs to build-logs branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          STATUS="${{ steps.status.outputs.result }}"
          RUN_NUMBER="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          FOLDER="${RUN_NUMBER}-${RUN_ID}-${TIMESTAMP}-${STATUS}"
          REMOTE_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Prepare the new build folder
          mkdir -p "${FOLDER}"
          cp logs/* "${FOLDER}/"
          if [ -d "test-reports" ]; then
            cp -r test-reports "${FOLDER}/test-reports"
          fi
          rm -rf logs test-reports

          git init -b build-logs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "${REMOTE_URL}"

          # Delete any old-format build-logs/* branches
          gh api "repos/${{ github.repository }}/git/matching-refs/heads/build-logs/" \
            --jq '.[].ref' 2>/dev/null \
            | while read -r ref; do
                short="${ref#refs/}"
                echo "Deleting old-format branch: $short"
                gh api -X DELETE "repos/${{ github.repository }}/git/refs/${short}" || true
              done

          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            git checkout --orphan build-logs
            git rm -r --cached . 2>/dev/null || true

            if git fetch origin build-logs --depth=1 --filter=blob:none 2>/dev/null; then
              git reset FETCH_HEAD

              FOLDERS=$(git ls-tree HEAD --name-only | sort -t- -k1 -n)
              if [ -n "$FOLDERS" ]; then
                COUNT=$(echo "$FOLDERS" | wc -l)
                KEEP=49
                if [ "$COUNT" -gt "$KEEP" ]; then
                  echo "$FOLDERS" | head -n $((COUNT - KEEP)) | while read -r old_folder; do
                    echo "Pruning old build folder: $old_folder"
                    git rm -r --cached "$old_folder"
                  done
                fi
              fi
            else
              echo "Branch does not exist yet — creating fresh"
            fi

            git add "${FOLDER}/"
            git commit -m "Build #${RUN_NUMBER} (${STATUS})"

            if git push -u origin build-logs; then
              echo "Successfully pushed build logs (attempt $attempt)"
              break
            fi

            if [ "$attempt" -eq "$MAX_RETRIES" ]; then
              echo "::warning::Failed to push build logs after $MAX_RETRIES attempts"
              exit 0
            fi

            echo "Push failed (attempt $attempt/$MAX_RETRIES), retrying..."
            sleep $((attempt * 2))
          done
